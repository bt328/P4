    <link rel="stylesheet" href="style.css">
    <title>Contact Us | Healthy Habits</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-md bg-dark navbar-dark">
        <div class="container-fluid">

            <!-- Brand -->
            <a class="navbar-brand" href="index.html">Healthy Habits</a>

            <!-- Mobile Toggle Button -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#collapsibleNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Navbar Links -->
            <div class="collapse navbar-collapse" id="collapsibleNavbar">
                <ul class="navbar-nav ms-auto"> <!-- ms-auto pushes items right -->

                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="sleeping.html">Sleeping</a>
                    </li>

                    <!-- Dropdown -->
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="productivity.html" id="navbardrop" role="button"
                            data-bs-toggle="dropdown" aria-expanded="false">
                            Productivity
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="productivity.html">Productivity</a></li>
                            <li><a class="dropdown-item" href="todo.html">To-Do List</a></li>
                        </ul>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="contact.html">Contact Us</a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="py-5">
        <div class="container">

            <div class="text-center mb-5">
                <h2>Contact Us</h2>
            </div>

            <div class="row justify-content-center">
                <div class="col-12 col-lg-10">

                    <div class="p-4 shadow-sm rounded-4 bg-light">

                        <form>

                            <div class="row g-3">

                                <!-- First Name -->
                                <div class="col-md-6">
                                    <label for="firstname" class="form-label">First Name</label>
                                    <input type="text" class="form-control" id="firstname" placeholder="First name"
                                        name="firstname">
                                </div>

                                <!-- Last Name -->
                                <div class="col-md-6">
                                    <label for="lastname" class="form-label">Last Name</label>
                                    <input type="text" class="form-control" id="lastname" placeholder="Last name"
                                        name="lastname">
                                </div>

                                <!-- Email -->
                                <div class="col-12">
                                    <label for="email" class="form-label">Email</label>
                                    <input type="email" class="form-control" id="email" placeholder="Enter email"
                                        name="email">
                                </div>

                                <!-- Checkbox -->
                                <div class="col-12">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="subscribe" name="subscribe">
                                        <label class="form-check-label" for="subscribe">
                                            Subscribe
                                        </label>
                                    </div>
                                </div>

                                <!-- Button -->
                                <div class="col-12 text-end">
                                    <button type="submit" class="btn btn-primary">
                                        Submit
                                    </button>
                                </div>

                            </div>

                        </form>

                    </div>

                </div>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="custom-footer">
