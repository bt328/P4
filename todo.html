  <link rel="stylesheet" href="style.css">
  <title>To-Do List | Healthy Habits</title>
  <script src="script.js"></script>
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-md bg-dark navbar-dark">
    <div class="container-fluid">

      <!-- Brand -->
      <a class="navbar-brand" href="index.html">Healthy Habits</a>

      <!-- Mobile Toggle Button -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#collapsibleNavbar">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Navbar Links -->
      <div class="collapse navbar-collapse" id="collapsibleNavbar">
        <ul class="navbar-nav ms-auto"> <!-- ms-auto pushes items right -->

          <li class="nav-item">
            <a class="nav-link" href="index.html">Home</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="sleeping.html">Sleeping</a>
          </li>

          <!-- Dropdown -->
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle active" href="productivity.html" id="navbardrop" role="button"
              data-bs-toggle="dropdown" aria-expanded="false">
              Productivity
            </a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="productivity.html">Productivity</a></li>
              <li><a class="dropdown-item active" href="todo.html">To-Do List</a></li>
            </ul>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="contact.html">Contact Us</a>
          </li>

        </ul>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="py-5">
    <div class="container">

      <div class="text-center mb-5">
        <h2>To-Do List</h2>
      </div>

      <div class="row justify-content-center">
        <div class="col-12 col-lg-10">

          <div class="p-4 shadow-sm rounded-4 bg-light">

            <!-- List -->
            <ul id="todoList" class="list-unstyled mb-4"></ul>

            <hr>

            <!-- Form -->
            <div class="row g-3">

              <div class="col-md-6">
                <label class="form-label">Description</label>
                <input type="text" id="taskInput" class="form-control" placeholder="Description">
              </div>

              <div class="col-md-6">
                <label class="form-label">Due Date</label>
                <input type="date" id="dateInput" class="form-control">
              </div>

              <div class="col-12 d-flex justify-content-between">
                <button class="btn btn-primary px-4" onclick="addTask()">
                  Add Item
                </button>

                <button class="btn btn-outline-danger px-4" onclick="deleteSelected()">
                  Delete Selected
                </button>
              </div>

            </div>

          </div>

        </div>
      </div>

    </div>
